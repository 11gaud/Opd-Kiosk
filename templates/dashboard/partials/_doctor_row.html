<tr id="doctor-row-{{ doctor.pk }}">
    <!-- Hidden CSRF for HTMX -->
    <form id="csrf-doctor-{{ doctor.pk }}" style="display:none">{% csrf_token %}</form>

    <td class="px-4 py-3 text-sm font-medium text-gray-900">{{ doctor.full_name }}</td>
    <td class="px-4 py-3 text-sm text-gray-600">{{ doctor.specialization }}</td>
    <td class="px-4 py-3 text-sm text-gray-600">{{ doctor.room_number|default:"—" }}</td>
    <td class="px-4 py-3 text-sm text-gray-600">{{ doctor.schedule_notes|default:"—" }}</td>
    <td class="px-4 py-3">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
            {% if doctor.availability == 'available' %}bg-green-100 text-green-700
            {% elif doctor.availability == 'unavailable' %}bg-gray-100 text-gray-600
            {% else %}bg-yellow-100 text-yellow-700{% endif %}">
            {{ doctor.get_availability_display }}
        </span>
    </td>
    <td class="px-4 py-3 text-sm">
        <button
            hx-post="{% url 'dashboard:doctor_toggle' doctor.pk %}"
            hx-target="#doctor-row-{{ doctor.pk }}"
            hx-swap="outerHTML"
            hx-include="#csrf-doctor-{{ doctor.pk }}"
            class="text-blue-600 hover:text-blue-800 font-medium transition">
            Toggle
        </button>
        <a href="{% url 'dashboard:doctor_edit' doctor.pk %}"
           class="text-gray-500 hover:text-gray-700 font-medium ml-3 transition">Edit</a>
        <a href="{% url 'dashboard:doctor_schedule' doctor.pk %}"
           class="text-indigo-600 hover:text-indigo-800 font-medium ml-3 transition">Schedule</a>
    </td>
</tr>

<div class="flex flex-col gap-1.5">
    <label for="{{ field.id_for_label }}" class="text-sm font-semibold text-slate-700">
        {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
    </label>
    {% if field.widget_type == 'select' %}
    <div class="relative">
        {{ field }}
        <svg class="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"
             fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
    </div>
    {% else %}
    {{ field }}
    {% endif %}
    {% if field.errors %}
    <p class="text-red-500 text-sm">{{ field.errors.0 }}</p>
    {% endif %}
</div>

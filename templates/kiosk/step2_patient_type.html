{% extends "base.html" %}
{% block title %}Patient Type — Kiosk{% endblock %}
{% block content %}

<div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="px-6 pt-6 pb-4 border-b border-slate-50">
        <a href="{% url back_url %}"
           class="inline-flex items-center gap-1.5 text-slate-400 hover:text-slate-600 text-sm font-medium mb-4 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
            Back
        </a>
        <h2 class="text-xl font-bold text-slate-800">Are you a…</h2>
        <p class="text-slate-400 text-sm mt-0.5">Please select your patient type to continue</p>
    </div>

    <div class="p-6">
        <form method="post" action="{% url 'kiosk:step2' %}">
            {% csrf_token %}
            <div class="space-y-3">

                <button type="submit" name="patient_type" value="new"
                    class="w-full group border-2 border-blue-500 bg-blue-50 hover:bg-blue-100 active:scale-[0.99] rounded-xl p-6 flex items-center gap-4 transition text-left">
                    <div class="w-14 h-14 rounded-xl bg-blue-600 flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xl font-bold text-blue-800">New Patient</p>
                        <p class="text-blue-500 text-base">First time visiting — register your information</p>
                    </div>
                    <svg class="w-5 h-5 text-blue-400 ml-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>

                <button type="submit" name="patient_type" value="existing"
                    class="w-full group border-2 border-slate-200 bg-white hover:border-slate-300 hover:bg-slate-50 active:scale-[0.99] rounded-xl p-6 flex items-center gap-4 transition text-left">
                    <div class="w-14 h-14 rounded-xl bg-slate-100 flex items-center justify-center flex-shrink-0">
                        <svg class="w-7 h-7 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xl font-bold text-slate-800">Existing Patient</p>
                        <p class="text-slate-400 text-base">I have visited before — find my record</p>
                    </div>
                    <svg class="w-5 h-5 text-slate-300 ml-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>

            </div>
        </form>
    </div>
</div>

{% endblock %}
